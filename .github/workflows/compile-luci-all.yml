name: Build luci-app-smartdns and openwrt-smartdns

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      update-version-number:
        description: 'Set to true to update the version number'
        required: false
        default: 'false'

jobs:
  get-version:
    name: Get latest version number
    runs-on: ubuntu-latest
    outputs:
      CUR_VERSION: ${{ steps.get-version.outputs.CUR_VERSION }}
    steps:
      - uses: actions/checkout@v3
        with:
          ref: VERSION_CONTROL
          fetch-depth: 1
          path: version_control
      - name: Get version
        id: get-version
        run: |
          pre_version=$(cat version_control/VERSION | grep "PREFEX" | sed 's/PREFEX=\(.*\)/\1/')
          cur_version=$(cat version_control/VERSION | grep "CUR_VERS" | sed 's/CUR_VERS=\(.*\)/\1/')
          echo "CUR_VERSION=$pre_version$cur_version" >> $GITHUB_OUTPUT

  build-smartdns:
    needs: get-version
    strategy:
      matrix:
        include:
          - arch: x86_64
            sdk_tag: x86-64-24.10.2
            package_arch: x86_64
          - arch: aarch64
            sdk_tag: armvirt-64-24.10.2
            package_arch: aarch64_cortex-a53
          - arch: armv7
            sdk_tag: armvirt-32-24.10.2
            package_arch: arm_cortex-a9_vfpv3-d16
      fail-fast: false
    runs-on: ubuntu-latest
    env:
      ARCH: ${{ matrix.arch }}
    steps:
      - name: Build smartdns in Docker
        env:
          CUR_VERSION: ${{ needs.get-version.outputs.CUR_VERSION }}
        run: |
          sudo timedatectl set-timezone "Asia/Shanghai"
          mkdir -p ${{ github.workspace }}/build
          docker pull openwrtorg/sdk:${{ matrix.sdk_tag }}
          docker run --rm -v ${{ github.workspace }}/build:/build -w /builder -e CUR_VERSION openwrtorg/sdk:${{ matrix.sdk_tag }} sh -c "echo 'src-git smartdns https://github.com/lwb1978/openwrt-smartdns.git' >> feeds.conf.default && ./scripts/feeds update -a && ./scripts/feeds install -a && sed -i \"s/VER=.*/VER=\$CUR_VERSION/\" feeds/smartdns/Makefile && make package/smartdns/compile V=s && cp bin/packages/${{ matrix.package_arch }}/smartdns/smartdns*.ipk /build/ || true"
      - name: Generate release tag
        id: tag
        run: |
          echo "release_tag=${{ needs.get-version.outputs.CUR_VERSION }}" >> $GITHUB_OUTPUT
          touch release.txt
          echo "Build openwrt-smartdns for ${{ matrix.arch }}" >> release.txt
          echo "Commit: ${{ github.sha }}" >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT
      - name: Upload to release
        uses: softprops/action-gh-release@v1
        if: steps.tag.outputs.status == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ github.workspace }}/build/*.ipk

  build-luci:
    needs: [get-version, build-smartdns]
    runs-on: ubuntu-latest
    steps:
      - name: Build luci-app-smartdns in Docker
        env:
          CUR_VERSION: ${{ needs.get-version.outputs.CUR_VERSION }}
        run: |
          sudo timedatectl set-timezone "Asia/Shanghai"
          mkdir -p ${{ github.workspace }}/build
          docker pull openwrtorg/sdk:x86-64-24.10.2
          docker run --rm -v ${{ github.workspace }}/build:/build -w /builder -e CUR_VERSION openwrtorg/sdk:x86-64-24.10.2 sh -c "echo 'src-git smartdns https://github.com/lwb1978/openwrt-smartdns.git' >> feeds.conf.default && echo 'src-git luci_app_smartdns https://github.com/lwb1978/luci-app-smartdns.git' >> feeds.conf.default && ./scripts/feeds update -a && ./scripts/feeds install -a && sed -i \"s/VER=.*/VER=\$CUR_VERSION/\" feeds/luci_app_smartdns/Makefile && make package/luci-app-smartdns/compile V=s && cp bin/packages/x86_64/luci_app_smartdns/luci-app-smartdns*.ipk /build/ || true"
      - name: Generate release tag
        id: tag
        run: |
          echo "release_tag=${{ needs.get-version.outputs.CUR_VERSION }}" >> $GITHUB_OUTPUT
          touch release.txt
          echo "Build luci-app-smartdns" >> release.txt
          echo "Commit: ${{ github.sha }}" >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT
      - name: Upload to release
        uses: softprops/action-gh-release@v1
        if: steps.tag.outputs.status == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ github.workspace }}/build/*.ipk

  update-version:
    if: ((github.event_name == 'workflow_dispatch' && github.event.inputs.update-version-number == 'true') || github.event_name == 'push')
    needs: [build-smartdns, build-luci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: VERSION_CONTROL
          fetch-depth: 1
          path: version_control
      - name: Update version
        run: |
          cd version_control
          pre_version=$(cat VERSION | grep "PREFEX" | sed 's/PREFEX=\(.*\)/\1/')
          cur_version=$(cat VERSION | grep "CUR_VERS" | sed 's/CUR_VERS=\(.*\)/\1/')
          cur_version=$(($cur_version + 1))
          sed -i "s/CUR_VERS=.*/CUR_VERS=$cur_version/" VERSION
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add VERSION
          git commit -m "Update version to $pre_version$cur_version"
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: VERSION_CONTROL
          directory: ./version_control
