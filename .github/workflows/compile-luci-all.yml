name: Build luci-app-smartdns and openwrt-smartdns

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      update-version-number:
        description: 'Set to true to update the version number'
        required: false
        default: 'false'

jobs:
  build-smartdns:
    strategy:
      matrix:
        include:
          - arch: x86_64
            target: x86
            subtarget: 64
            package_arch: x86_64
          - arch: aarch64
            target: armsr
            subtarget: armv8
            package_arch: aarch64
      fail-fast: false
    runs-on: ubuntu-latest
    env:
      ARCH: ${{ matrix.arch }}
    steps:
      - name: Download and extract OpenWrt SDK
        run: |
          sudo apt update
          sudo apt install -y build-essential ccache git file g++ gawk gettext libncurses-dev libssl-dev zlib1g-dev zstd
          mkdir -p openwrt-sdk
          curl -sSL --retry 3 --retry-delay 5 https://mirror-03.infra.openwrt.org/releases/24.10.2/targets/${{ matrix.target }}/${{ matrix.subtarget }}/openwrt-sdk-24.10.2-${{ matrix.target }}-${{ matrix.subtarget }}_gcc-13.3.0_musl.Linux-x86_64.tar.zst -o sdk.tar.zst
          tar --use-compress-program=unzstd -xvf sdk.tar.zst -C openwrt-sdk --strip-components=1

      - name: Update and install feeds (smartdns)
        run: |
          cd openwrt-sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Clone smartdns source into feeds
        run: |
          cd openwrt-sdk
          WORKINGDIR="feeds/packages/net/smartdns"
          rm -rf "$WORKINGDIR"
          rm -rf feeds/luci/applications/luci-app-smartdns
          mkdir -p "$WORKINGDIR"
          mkdir -p feeds/luci/applications/luci-app-smartdns
          git clone https://github.com/lwb1978/openwrt-smartdns.git "$WORKINGDIR"
          ./scripts/feeds install -f smartdns
          ./scripts/feeds install -f luci-app-smartdns
          make defconfig

      - name: Build smartdns
        run: |
          cd openwrt-sdk
          make package/smartdns/compile V=s
          make package/luci-app-smartdns/compile V=s
          mkdir -p $GITHUB_WORKSPACE/build
          cp bin/packages/${{ matrix.package_arch }}/smartdns/smartdns*.ipk $GITHUB_WORKSPACE/build/ || true
          cp bin/packages/x86_64/luci-app-smartdns/luci-app-smartdns*.ipk $GITHUB_WORKSPACE/build/ || true

      - name: Generate release tag
        id: tag
        run: |
          echo "release_tag= 20250802" >> $GITHUB_OUTPUT
          echo "Build openwrt-smartdns for ${{ matrix.arch }}" > release.txt
          echo "Commit: ${{ github.sha }}" >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        if: steps.tag.outputs.status == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ github.workspace }}/build/*.ipk
  build-luci:
    needs: [build-smartdns]
    runs-on: ubuntu-latest
    steps:
      - name: Download and extract OpenWrt SDK
        run: |
          sudo apt update
          sudo apt install -y build-essential ccache git file g++ gawk gettext libncurses-dev libssl-dev zlib1g-dev zstd
          mkdir -p openwrt-sdk
          curl -sSL --retry 3 --retry-delay 5 https://mirror-03.infra.openwrt.org/releases/24.10.2/targets/x86/64/openwrt-sdk-24.10.2-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst -o sdk.tar.zst
          tar --use-compress-program=unzstd -xvf sdk.tar.zst -C openwrt-sdk --strip-components=1

      - name: Clone luci-app-smartdns source into feeds
        run: |
          cd openwrt-sdk
          WORKINGDIR="feeds/luci/applications/luci-app-smartdns"
          rm -rf "$WORKINGDIR"
          mkdir -p "$WORKINGDIR"
          git clone https://github.com/lwb1978/luci-app-smartdns.git "$WORKINGDIR"

      - name: Update and install feeds (luci)
        run: |
          cd openwrt-sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig

      - name: Build luci-app-smartdns
        run: |
          cd openwrt-sdk
          make package/luci-app-smartdns/compile V=s
          mkdir -p $GITHUB_WORKSPACE/build
          cp bin/packages/x86_64/luci-app-smartdns/luci-app-smartdns*.ipk $GITHUB_WORKSPACE/build/ || true

      - name: Generate release tag
        id: tag
        run: |
          echo "release_tag= 20250802" >> $GITHUB_OUTPUT
          echo "Build luci-app-smartdns" > release.txt
          echo "Commit: ${{ github.sha }}" >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        if: steps.tag.outputs.status == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ github.workspace }}/build/*.ipk
