name: Build luci-app-smartdns and openwrt-smartdns

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      update-version-number:
        description: 'Set to true to update the version number'
        required: false
        default: 'false'

jobs:
  get-version:
    name: Get latest version number
    runs-on: ubuntu-latest
    outputs:
      CUR_VERSION: ${{ steps.get-version.outputs.CUR_VERSION }}
    steps:
      - uses: actions/checkout@v3
        with:
          ref: VERSION_CONTROL
          fetch-depth: 1
          path: version_control
      - name: Get version
        id: get-version
        run: |
          pre_version=$(grep "PREFEX" version_control/VERSION | sed 's/PREFEX=//')
          cur_version=$(grep "CUR_VERS" version_control/VERSION | sed 's/CUR_VERS=//')
          echo "CUR_VERSION=$pre_version$cur_version" >> $GITHUB_OUTPUT
  build-smartdns:
    needs: get-version
    strategy:
      matrix:
        include:
          - arch: x86_64
            target: x86
            subtarget: 64
            package_arch: x86_64
          - arch: aarch64
            target: armsr
            subtarget: armv8
            package_arch: aarch64
      fail-fast: false
    runs-on: ubuntu-latest
    env:
      ARCH: ${{ matrix.arch }}
    steps:
      - name: Download and extract OpenWrt SDK
        run: |
          sudo apt update
          sudo apt install -y build-essential ccache git file g++ gawk gettext libncurses-dev libssl-dev zlib1g-dev zstd
          mkdir -p openwrt-sdk
          curl -sSL --retry 3 --retry-delay 5 https://mirror-03.infra.openwrt.org/releases/24.10.2/targets/${{ matrix.target }}/${{ matrix.subtarget }}/openwrt-sdk-24.10.2-${{ matrix.target }}-${{ matrix.subtarget }}_gcc-13.3.0_musl.Linux-x86_64.tar.zst -o sdk.tar.zst
          tar --use-compress-program=unzstd -xvf sdk.tar.zst -C openwrt-sdk --strip-components=1

      - name: Clone smartdns source into feeds
        run: |
          cd openwrt-sdk
          WORKINGDIR="feeds/packages/net/smartdns"
          rm -rf "$WORKINGDIR"
          mkdir -p "$WORKINGDIR"
          git clone https://github.com/lwb1978/openwrt-smartdns.git "$WORKINGDIR"

      - name: Update and install feeds (smartdns)
        run: |
          cd openwrt-sdk
          ./scripts/feeds update -a
          ./scripts/feeds install smartdns
          make defconfig

      - name: Build smartdns
        env:
          CUR_VERSION: ${{ needs.get-version.outputs.CUR_VERSION }}
        run: |
          cd openwrt-sdk
          sed -i "s/VER=.*/VER=$CUR_VERSION/" feeds/packages/net/smartdns/Makefile
          make package/smartdns/compile V=s
          mkdir -p $GITHUB_WORKSPACE/build
          cp bin/packages/${{ matrix.package_arch }}/smartdns/smartdns*.ipk $GITHUB_WORKSPACE/build/ || true

      - name: Generate release tag
        id: tag
        run: |
          echo "release_tag=${{ needs.get-version.outputs.CUR_VERSION }}" >> $GITHUB_OUTPUT
          echo "Build openwrt-smartdns for ${{ matrix.arch }}" > release.txt
          echo "Commit: ${{ github.sha }}" >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        if: steps.tag.outputs.status == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ github.workspace }}/build/*.ipk
  build-luci:
    needs: [get-version, build-smartdns]
    runs-on: ubuntu-latest
    steps:
      - name: Download and extract OpenWrt SDK
        run: |
          sudo apt update
          sudo apt install -y build-essential ccache git file g++ gawk gettext libncurses-dev libssl-dev zlib1g-dev zstd
          mkdir -p openwrt-sdk
          curl -sSL --retry 3 --retry-delay 5 https://mirror-03.infra.openwrt.org/releases/24.10.2/targets/x86/64/openwrt-sdk-24.10.2-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst -o sdk.tar.zst
          tar --use-compress-program=unzstd -xvf sdk.tar.zst -C openwrt-sdk --strip-components=1

      - name: Clone luci-app-smartdns source into feeds
        run: |
          cd openwrt-sdk
          WORKINGDIR="feeds/luci/applications/luci-app-smartdns"
          rm -rf "$WORKINGDIR"
          mkdir -p "$WORKINGDIR"
          git clone https://github.com/lwb1978/luci-app-smartdns.git "$WORKINGDIR"

      - name: Update and install feeds (luci)
        run: |
          cd openwrt-sdk
          ./scripts/feeds update -a
          ./scripts/feeds install luci-app-smartdns
          make defconfig

      - name: Build luci-app-smartdns
        env:
          CUR_VERSION: ${{ needs.get-version.outputs.CUR_VERSION }}
        run: |
          cd openwrt-sdk
          sed -i "s/VER=.*/VER=$CUR_VERSION/" feeds/luci/applications/luci-app-smartdns/Makefile
          make package/luci-app-smartdns/compile V=s
          mkdir -p $GITHUB_WORKSPACE/build
          cp bin/packages/x86_64/luci-app-smartdns/luci-app-smartdns*.ipk $GITHUB_WORKSPACE/build/ || true

      - name: Generate release tag
        id: tag
        run: |
          echo "release_tag=${{ needs.get-version.outputs.CUR_VERSION }}" >> $GITHUB_OUTPUT
          echo "Build luci-app-smartdns" > release.txt
          echo "Commit: ${{ github.sha }}" >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        if: steps.tag.outputs.status == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ github.workspace }}/build/*.ipk

  update-version:
    if: ((github.event_name == 'workflow_dispatch' && github.event.inputs.update-version-number == 'true') || github.event_name == 'push')
    needs: [build-smartdns, build-luci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: VERSION_CONTROL
          fetch-depth: 1
          path: version_control
      - name: Update version
        run: |
          cd version_control
          pre_version=$(grep "PREFEX" VERSION | sed 's/PREFEX=//')
          cur_version=$(grep "CUR_VERS" VERSION | sed 's/CUR_VERS=//')
          new_version=$(($cur_version + 1))
          sed -i "s/CUR_VERS=.*/CUR_VERS=$new_version/" VERSION
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add VERSION
          git commit -m "Update version to $pre_version$new_version"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: VERSION_CONTROL
          directory: ./version_control
