name: Build luci-app-smartdns and openwrt-smartdns

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      update-version-number:
        description: 'Set to true to update the version number'
        required: false
        default: 'false'

jobs:
  get-version:
    name: Get latest version number
    runs-on: ubuntu-latest
    outputs:
      CUR_VERSION: ${{ steps.get-version.outputs.CUR_VERSION }}
    steps:
      - uses: actions/checkout@v3
        with:
          ref: VERSION_CONTROL
          fetch-depth: 1
          path: version_control
      - name: Get version
        id: get-version
        run: |
          pre_version=$(cat version_control/VERSION | grep "PREFEX" | sed 's/PREFEX=\(.*\)/\1/')
          cur_version=$(cat version_control/VERSION | grep "CUR_VERS" | sed 's/CUR_VERS=\(.*\)/\1/')
          echo "CUR_VERSION=$pre_version$cur_version" >> $GITHUB_OUTPUT

  build-smartdns:
    needs: get-version
    strategy:
      matrix:
        arch: [x86_64, aarch64, mipsel, mips, armv7l]
      fail-fast: false
    runs-on: ubuntu-latest
    env:
      ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v3
        with:
          repository: lwb1978/openwrt-smartdns
          path: openwrt-smartdns
      - name: Set up OpenWrt SDK
        run: |
          sudo apt update
          sudo apt install -y build-essential ccache git file g++ gawk gettext libncurses-dev libssl-dev zlib1g-dev zstd
          mkdir -p ${{ github.workspace }}/openwrt-sdk
          curl -sSL --retry 3 --retry-delay 5 https://mirror-03.infra.openwrt.org/releases/24.10.2/targets/x86/64/openwrt-sdk-24.10.2-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst -o sdk.tar.zst
          file sdk.tar.zst | grep "Zstandard compressed data" || { echo "Invalid tar.zst file"; exit 1; }
          tar --use-compress-program=unzstd -xvf sdk.tar.zst -C openwrt-sdk --strip-components=1
      - name: Prepare feeds
        run: |
          cd ${{ github.workspace }}/openwrt-sdk
          echo "src-git smartdns https://github.com/lwb1978/openwrt-smartdns.git" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
      - name: Configure and build smartdns
        run: |
          cd ${{ github.workspace }}/openwrt-sdk
          sed -i "s/VER=.*/VER=${{ needs.get-version.outputs.CUR_VERSION }}/" feeds/smartdns/Makefile
          make package/smartdns/compile V=s
          mkdir -p ${{ github.workspace }}/build
          cp bin/packages/${{ matrix.arch }}/smartdns*.ipk ${{ github.workspace }}/build/
      - name: Generate release tag
        id: tag
        run: |
          echo "release_tag=${{ needs.get-version.outputs.CUR_VERSION }}" >> $GITHUB_OUTPUT
          touch release.txt
          echo "Build openwrt-smartdns for ${{ matrix.arch }}" >> release.txt
          echo "Commit: ${{ github.sha }}" >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT
      - name: Upload to release
        uses: softprops/action-gh-release@v1
        if: steps.tag.outputs.status == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ github.workspace }}/build/*.ipk

  build-luci:
    needs: [get-version, build-smartdns]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          repository: lwb1978/luci-app-smartdns
          path: luci-app-smartdns
      - name: Set up OpenWrt SDK
        run: |
          sudo apt update
          sudo apt install -y build-essential ccache git file g++ gawk gettext libncurses-dev libssl-dev zlib1g-dev zstd
          mkdir -p ${{ github.workspace }}/openwrt-sdk
          curl -sSL --retry 3 --retry-delay 5 https://mirror-03.infra.openwrt.org/releases/24.10.2/targets/x86/64/openwrt-sdk-24.10.2-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst -o sdk.tar.zst
          file sdk.tar.zst | grep "Zstandard compressed data" || { echo "Invalid tar.zst file"; exit 1; }
          tar --use-compress-program=unzstd -xvf sdk.tar.zst -C openwrt-sdk --strip-components=1
      - name: Prepare feeds
        run: |
          cd ${{ github.workspace }}/openwrt-sdk
          echo "src-git smartdns https://github.com/lwb1978/openwrt-smartdns.git" >> feeds.conf.default
          echo "src-git luci_app_smartdns https://github.com/lwb1978/luci-app-smartdns.git" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
      - name: Configure and build luci-app-smartdns
        run: |
          cd ${{ github.workspace }}/openwrt-sdk
          sed -i "s/VER=.*/VER=${{ needs.get-version.outputs.CUR_VERSION }}/" feeds/luci_app_smartdns/Makefile
          make package/luci-app-smartdns/compile V=s
          mkdir -p ${{ github.workspace }}/build
          cp bin/packages/x86_64/luci-app-smartdns*.ipk ${{ github.workspace }}/build/
      - name: Generate release tag
        id: tag
        run: |
          echo "release_tag=${{ needs.get-version.outputs.CUR_VERSION }}" >> $GITHUB_OUTPUT
          touch release.txt
          echo "Build luci-app-smartdns" >> release.txt
          echo "Commit: ${{ github.sha }}" >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT
      - name: Upload to release
        uses: softprops/action-gh-release@v1
        if: steps.tag.outputs.status == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ github.workspace }}/build/*.ipk

  update-version:
    if: ((github.event_name == 'workflow_dispatch' && github.event.inputs.update-version-number == 'true') || github.event_name == 'push')
    needs: [build-smartdns, build-luci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: VERSION_CONTROL
          fetch-depth: 1
          path: version_control
      - name: Update version
        run: |
          cd version_control
          pre_version=$(cat VERSION | grep "PREFEX" | sed 's/PREFEX=\(.*\)/\1/')
          cur_version=$(cat VERSION | grep "CUR_VERS" | sed 's/CUR_VERS=\(.*\)/\1/')
          cur_version=$(($cur_version + 1))
          sed -i "s/CUR_VERS=.*/CUR_VERS=$cur_version/" VERSION
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add VERSION
          git commit -m "Update version to $pre_version$cur_version"
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: VERSION_CONTROL
          directory: ./version_control
