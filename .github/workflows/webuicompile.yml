name: Build and Package libsmartdns_ui.so for musl

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      update-version:
        description: 'Set to true to update version number'
        default: 'false'

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.set-version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
      - name: Get or Set Version
        id: set-version
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION | grep "CUR_VERS" | sed 's/CUR_VERS=\(.*\)/\1/' || echo "1.0.0")
          else
            VERSION="1.0.0"
            echo "CUR_VERS=$VERSION" > VERSION
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: get-version
    strategy:
      matrix:
        arch: [x86_64, aarch64]
      fail-fast: false
    runs-on: ubuntu-latest
    env:
      TARGET: ${{ matrix.arch == 'x86_64' && 'x86_64-unknown-linux-musl' || 'aarch64-unknown-linux-musl' }}
      CC: ${{ matrix.arch == 'x86_64' && 'musl-gcc' || 'aarch64-linux-musl-gcc' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build libsmartdns_ui.so in Docker
        run: |
          mkdir -p build/${{ matrix.arch }}
          docker run -i --rm -v ${{ github.workspace }}:/workdir -e CC=${{ env.CC }} -e LIBCLANG_STATIC=1 -e LIBCLANG_PATH=/usr/lib -e CLANG_PATH=/usr/bin/clang -e RUST_BACKTRACE=1 -e PATH=/usr/local/bin:/usr/bin:/bin:/sbin rust:alpine sh -c "
            cat /etc/os-release &&  # Debug: Confirm Alpine OS
            echo 'Current PATH: \$PATH' &&
            ls -la /sbin/apk || echo 'apk binary not found in /sbin' &&
            /sbin/apk update || { echo 'apk not found or failed'; exit 1; } &&
            /sbin/apk add --no-cache build-base openssl-dev pkgconf perl make clang clang-dev musl-dev curl gcompat linux-headers &&
            # Install aarch64 cross-compiler if needed
            if [ '${{ matrix.arch }}' = 'aarch64' ]; then \
              curl -L https://musl.cc/aarch64-linux-musl-cross.tgz -o /tmp/aarch64-cross.tgz && \
              tar -xzf /tmp/aarch64-cross.tgz -C /usr/local && \
              ln -s /usr/local/aarch64-linux-musl-cross/bin/aarch64-linux-musl-gcc /usr/bin/aarch64-linux-musl-gcc; \
            fi &&
            rustup update 1.81.0 &&
            rustup default 1.81.0 &&
            rustup target add x86_64-unknown-linux-musl aarch64-unknown-linux-musl &&
            rustc --version && cargo --version || { echo 'Rust installation failed'; exit 1; } &&
            echo '=== Cargo.toml ===' && cat /workdir/plugin/smartdns-ui/Cargo.toml &&
            echo 'CC is set to: \$CC' && which \$CC || echo 'CC not found' &&
            ls -la /usr/lib/libclang* &&  # Debug: Check libclang files
            ls -la /usr/bin/musl-gcc || echo 'musl-gcc not found in /usr/bin' &&
            # Test compiler
            echo 'int main() { return 0; }' > /tmp/test.c &&
            \$CC -o /tmp/test /tmp/test.c && echo 'Compiler test succeeded' || { echo 'Compiler test failed'; exit 1; } &&
            cd /workdir/plugin/smartdns-ui &&
            cargo build --release --target ${{ env.TARGET }} --verbose &&
            cp target/${{ env.TARGET }}/release/libsmartdns_ui.so /workdir/build/${{ matrix.arch }}/
          " || echo "Build failed for ${{ matrix.arch }}, check logs"

      - name: Package Artifacts
        run: |
          cd build/${{ matrix.arch }}
          tar -czvf ../../libsmartdns_ui-${{ matrix.arch }}-musl.tar.gz .
          cd ../..

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libsmartdns_ui-${{ matrix.arch }}-musl
          path: libsmartdns_ui-${{ matrix.arch }}-musl.tar.gz
          retention-days: 30

      - name: Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.get-version.outputs.VERSION }}
          files: libsmartdns_ui-${{ matrix.arch }}-musl.tar.gz
