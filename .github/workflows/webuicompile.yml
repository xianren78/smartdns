name: Build and Package libsmartdns_ui.so for musl

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      # 检出代码
      - uses: actions/checkout@v3

      # 安装 Rust 工具链
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          target: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl

      # 安装 musl-tools 和 QEMU
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools qemu-user-static build-essential pkg-config libssl-dev

      # 为 x86_64 编译 libsmartdns_ui.so
      - name: Build for x86_64-unknown-linux-musl
        run: |
          cd plugin/smartdns-ui
          EXTRA_CFLAGS=-fPIC make -j$(nproc)
          mkdir -p x86_64-dist
          cp target/libsmartdns_ui.so x86_64-dist/
          # 查找并复制相关动态库
          ldd target/libsmartdns_ui.so | grep -o '/[^ ]*' | xargs -I {} cp {} x86_64-dist/ || true

      # 为 aarch64 编译 libsmartdns_ui.so
      - name: Build for aarch64-unknown-linux-musl
        env:
          CC: aarch64-linux-musl-gcc
          AR: aarch64-linux-musl-ar
        run: |
          sudo ln -s /usr/bin/musl-gcc /usr/bin/aarch64-linux-musl-gcc
          cd plugin/smartdns-ui
          cargo clean
          EXTRA_CFLAGS=-fPIC make -j$(nproc)
          mkdir -p aarch64-dist
          cp target/libsmartdns_ui.so aarch64-dist/
          # 使用 QEMU 和 chroot 环境查找动态库
          qemu-aarch64 target/libsmartdns_ui.so || true  # 测试运行，忽略错误
          ldd target/libsmartdns_ui.so | grep -o '/[^ ]*' | xargs -I {} cp {} aarch64-dist/ || true

      # 打包为 tar.gz
      - name: Package Artifacts
        run: |
          tar -czvf libsmartdns_ui-x86_64-musl.tar.gz -C x86_64-dist .
          tar -czvf libsmartdns_ui-aarch64-musl.tar.gz -C aarch64-dist .

      # 上传 artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: libsmartdns_ui-so-files
          path: |
            libsmartdns_ui-x86_64-musl.tar.gz
            libsmartdns_ui-aarch64-musl.tar.gz

      # 可选：使用 QEMU 测试 aarch64 版本
      - name: Test aarch64 Binary with QEMU
        run: |
          qemu-aarch64 -L /usr/aarch64-linux-gnu aarch64-dist/libsmartdns_ui.so || true
