name: Build and Release SmartDNS UI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-20.04
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
        include:
          - target: x86_64-unknown-linux-gnu
            name: x86-64
          - target: aarch64-unknown-linux-gnu
            name: aarch64_generic

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        target: ${{ matrix.target }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libc6-dev gcc-10 g++-10 gcc-aarch64-linux-gnu libc6-dev-arm64-cross
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-10 100
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-10 100
        gcc --version

    - name: Build libsmartdns_ui.so
      working-directory: plugin/smartdns-ui
      env:
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        RUSTFLAGS: "-C target-feature=-crt-static"
        TARGET: ${{ matrix.target }}
      run: |
        echo "Workflow TARGET=$TARGET"
        EXTRA_CFLAGS=-fPIC make
        ls -l target/${{ matrix.target }}/release/
        mkdir -p release-${{ matrix.name }}
        cp target/${{ matrix.target }}/release/libsmartdns_ui.so release-${{ matrix.name }}/

    - name: Collect dynamic dependencies
      working-directory: plugin/smartdns-ui/release-${{ matrix.name }}
      run: |
        if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
          ldd libsmartdns_ui.so | grep "=> /" | awk '{print $3}' | xargs -I {} cp {} . || true
          cp /lib64/ld-linux-x86-64.so.2 . || cp /usr/lib64/ld-linux-x86-64.so.2 . || true
        else
          cp /usr/aarch64-linux-gnu/lib/ld-linux-aarch64.so.1 . || true
          cp /usr/aarch64-linux-gnu/lib/libc.so.6 . || true
          cp /usr/aarch64-linux-gnu/lib/libm.so.6 . || true
        fi
        chmod 644 *.so
        ls -l

    - name: Package release
      working-directory: plugin/smartdns-ui
      run: |
        tar -czvf smartdns-ui-release-${{ matrix.name }}.tar.gz -C release-${{ matrix.name }} .
        ls -lh smartdns-ui-release-${{ matrix.name }}.tar.gz

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: smartdns-ui-release-${{ matrix.name }}
        path: plugin/smartdns-ui/smartdns-ui-release-${{ matrix.name }}.tar.gz
        retention-days: 30
        if-no-files-found: error

    - name: Create Release and Upload
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        files: plugin/smartdns-ui/smartdns-ui-release-${{ matrix.name }}.tar.gz
        tag_name: "v${{ github.run_number }}"
        name: "SmartDNS UI Release ${{ github.run_number }}"
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}