name: Extract and Release SmartDNS UI Libraries as ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  extract-and-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v3
      
      # Pull the pre-built image from Docker Hub
      - name: Pull Docker Image
        run: |
          docker pull pikuzheng/smartdns:ui --platform ${{ matrix.platform }}
      
      # Get image creation date
      - name: Get Image Creation Date
        id: get-date
        run: |
          CREATION_DATE=$(docker inspect pikuzheng/smartdns:ui | grep Created | head -1 | sed 's/.*"Created": "\([^T]*\).*/\1/' | tr -d '-')
          echo "creation_date=$CREATION_DATE" >> $GITHUB_OUTPUT
      
      # Extract files from the pulled image with debugging
      - name: Extract Files from Image
        run: |
          mkdir -p release-files-${{ matrix.platform }}
          docker create --name temp-container pikuzheng/smartdns:ui
          echo "Listing container contents at /usr/lib:"
          docker run --rm pikuzheng/smartdns:ui ls -l /usr/lib || echo "Failed to list /usr/lib"
          docker cp temp-container:/usr/lib/libsmartdns_ui.so release-files-${{ matrix.platform }}/ || echo "libsmartdns_ui.so not found"
          docker cp temp-container:/usr/lib/libgcc_s.so.1 release-files-${{ matrix.platform }}/ || echo "libgcc_s.so.1 not found"
          docker rm temp-container
          echo "Files in release-files-${{ matrix.platform }}:"
          ls -l release-files-${{ matrix.platform }} || echo "Directory is empty"
      
      # Compress files into a ZIP with validation
      - name: Create ZIP Archive
        run: |
          cd release-files-${{ matrix.platform }}
          if [ -f "libsmartdns_ui.so" ] && [ -f "libgcc_s.so.1" ]; then
            zip ../smartdns-libs-${{ matrix.platform }}-${{ steps.get-date.outputs.creation_date }}.zip libsmartdns_ui.so libgcc_s.so.1
          else
            echo "Error: One or both files (libsmartdns_ui.so, libgcc_s.so.1) are missing. Skipping ZIP creation."
            exit 1
          fi
      
      # Create platform-specific release (only if ZIP exists)
      - name: Create GitHub Release
        if: success()  # Only run if previous steps succeeded
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get-date.outputs.creation_date }}-${{ matrix.platform }}
          name: Release ${{ steps.get-date.outputs.creation_date }} (${{ matrix.platform }})
          body: |
            Automated release for ${{ matrix.platform }} containing:
            - libsmartdns_ui.so
            - libgcc_s.so.1
            Extracted from pikuzheng/smartdns:ui Docker image (Created: ${{ steps.get-date.outputs.creation_date }})
          draft: false
          prerelease: false
          files: |
            smartdns-libs-${{ matrix.platform }}-${{ steps.get-date.outputs.creation_date }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
