name: Build and Release SmartDNS UI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        profile: minimal
        toolchain: stable

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libc6-dev

    - name: Build libsmartdns_ui.so
      working-directory: plugin/smartdns-ui
      run: |
        EXTRA_CFLAGS=-fPIC make
        mkdir -p release
        cp target/libsmartdns_ui.so release/

    - name: Collect dynamic dependencies
      working-directory: plugin/smartdns-ui/release
      run: |
        # 使用 ldd 查看依赖并复制必要的动态库
        ldd libsmartdns_ui.so | grep "=> /" | awk '{print $3}' | xargs -I {} cp {} .
        # 确保包含 ld-linux-x86-64.so.2
        cp /lib64/ld-linux-x86-64.so.2 . || cp /usr/lib64/ld-linux-x86-64.so.2 . || true

    - name: Package release
      working-directory: plugin/smartdns-ui
      run: |
        tar -czvf smartdns-ui-release.tar.gz -C release .
        ls -lh smartdns-ui-release.tar.gz

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: smartdns-ui-release
        path: plugin/smartdns-ui/smartdns-ui-release.tar.gz
        retention-days: 30

    - name: Create Release and Upload
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        files: plugin/smartdns-ui/smartdns-ui-release.tar.gz
        tag_name: "v${{ github.run_number }}"
        name: "SmartDNS UI Release ${{ github.run_number }}"
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}