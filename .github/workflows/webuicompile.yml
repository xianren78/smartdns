name: Build and Package libsmartdns_ui.so for musl

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      # 检出代码
      - uses: actions/checkout@v4

      # 安装 Rust 工具链
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          target: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl
          components: rustfmt  # Optional, for formatting checks

      # 安装 musl-tools 和 QEMU
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools qemu-user-static build-essential pkg-config libssl-dev

      # 为 x86_64 编译 libsmartdns_ui.so
      - name: Build for x86_64-unknown-linux-musl
        env:
          RUSTFLAGS: -C target-feature=+crt-static -C link-args=-rdynamic  # Enable dynamic linking
        run: |
          cd plugin/smartdns-ui
          cargo build --release --target x86_64-unknown-linux-musl
          mkdir -p x86_64-dist
          cp target/x86_64-unknown-linux-musl/release/libsmartdns_ui.so x86_64-dist/ || ls -la target/x86_64-unknown-linux-musl/release/
          ldd target/x86_64-unknown-linux-musl/release/libsmartdns_ui.so || true

      # 为 aarch64 编译 libsmartdns_ui.so
      - name: Build for aarch64-unknown-linux-musl
        env:
          RUSTFLAGS: -C target-feature=+crt-static -C link-args=-rdynamic
          CC: musl-gcc  # Explicitly use musl-gcc for aarch64
        run: |
          cd plugin/smartdns-ui
          cargo clean  # Avoid architecture conflicts
          cargo build --release --target aarch64-unknown-linux-musl
          mkdir -p aarch64-dist
          cp target/aarch64-unknown-linux-musl/release/libsmartdns_ui.so aarch64-dist/ || ls -la target/aarch64-unknown-linux-musl/release/
          qemu-aarch64 target/aarch64-unknown-linux-musl/release/libsmartdns_ui.so || true

      # 打包为 tar.gz
      - name: Package Artifacts
        run: |
          tar -czvf libsmartdns_ui-x86_64-musl.tar.gz -C x86_64-dist .
          tar -czvf libsmartdns_ui-aarch64-musl.tar.gz -C aarch64-dist .

      # 上传 artifacts，使用 v4
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libsmartdns_ui-so-files
          path: |
            libsmartdns_ui-x86_64-musl.tar.gz
            libsmartdns_ui-aarch64-musl.tar.gz
          retention-days: 30

      # 可选：使用 QEMU 测试 aarch64 版本
      - name: Test aarch64 Binary with QEMU
        run: |
          qemu-aarch64 -L /usr/aarch64-linux-gnu aarch64-dist/libsmartdns_ui.so || true
