name: Extract and Release SmartDNS UI Libraries

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  extract-and-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v3
      
      # Pull the pre-built image from Docker Hub
      - name: Pull Docker Image
        run: |
          docker pull pikuzheng/smartdns:ui --platform ${{ matrix.platform }}
      
      # Extract files from the pulled image
      - name: Extract Files from Image
        run: |
          mkdir -p release-files-${{ matrix.platform }}
          docker create --name temp-container pikuzheng/smartdns:ui
          docker cp temp-container:/usr/lib/libsmartdns_ui.so release-files-${{ matrix.platform }}/
          docker cp temp-container:/usr/lib/libgcc_s.so.1 release-files-${{ matrix.platform }}/
          docker rm temp-container
      
      # Get version (assuming the version is still in your repo, adjust if needed)
      - name: Get Version
        id: get-version
        run: |
          if [ -f "version_control/VERSION" ]; then
            pre_version=$(cat version_control/VERSION | grep "PREFEX" | sed 's/PREFEX=\(.*\)/\1/')
            cur_version=$(cat version_control/VERSION | grep "CUR_VERS" | sed 's/CUR_VERS=\(.*\)/\1/')
            echo "version=${pre_version}${cur_version}" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
          fi
      
      # Create platform-specific release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get-version.outputs.version }}-${{ matrix.platform }}
          name: Release ${{ steps.get-version.outputs.version }} (${{ matrix.platform }})
          body: |
            Automated release for ${{ matrix.platform }} containing:
            - libsmartdns_ui.so
            - libgcc_s.so.1
            Extracted from pikuzheng/smartdns:ui Docker image
          draft: false
          prerelease: false
          files: |
            release-files-${{ matrix.platform }}/libsmartdns_ui.so
            release-files-${{ matrix.platform }}/libgcc_s.so.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
