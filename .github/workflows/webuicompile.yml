name: Build and Release libsmartdns_ui

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  create_release:
    runs-on: Ubuntu-22.04
    outputs:
      upload_url: ${{ steps.create_release.output.id }}
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: true
          prerelease: false

  build_x86_64:
    runs-on: Ubuntu-22.04
    needs: create_release
    steps:
      - name: Checkout code
        uses: actions/check-out@v2

      - name: Build x86_64
        run: |
          docker pull jess/alpine-rust
          docker run --rm -v $(pwd):/workspace jess/alpine-rust /bin/bash -c "
            cd /workspace
            cargo build --target x86_64-unknown-linux-musl --release
            LIB_PATH=target/x86_64-unknown-linux-musl/release/libsmartdns_ui.so
            LIB_NAME=$(basename $LIB_PATH)
            mkdir -p package/x86_64/lib
            cp $LIB_PATH package/x86_64/lib/
            function copy_dependencies() {
                local lib=$1
                local dest_dir=$2
                local copied_files=()
                while read -r line; do
                    if [[ $line =~ ^\/\w+ ]]; then
                        dep_path=${line#/}
                        dep_name=${dep_path##*/}
                        if ! [[ " ${copied_files[@]} " =~ " $dep_path " ]]; then
                            cp \"$dep_path\" \"$dest_dir\"
                            copied_files+=(\"$dep_path\")
                            copy_dependencies \"$dest_dir/$dep_name\" \"$dest_dir\"
                        fi
                    fi
                done < <(ldd \"$lib\" | grep \" => \" | awk '{print $3}')
            }
            copy_dependencies \"package/x86_64/lib/$LIB_NAME\" \"package/x86_64/lib/\"
            tar -czf libsmartdns_ui_x86_64.tar.gz package/x86_64
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v2
        with:
          name: libsmartdns_ui_x86_64.tar.gz
          path: libsmartdns_ui_x86_64.tar.gz

  build_aarch64:
    runs-on: Ubuntu-22.04
    needs: create_release
    steps:
      - name: Checkout code
        uses: actions/check-out@v2

      - name: Build aarch64
        run: |
          docker pull dlr-e/musl-cross-aarch64
          docker run --rm -v $(pwd):/workspace dlr-e/musl-cross-aarch64 /bin/bash -c "
            apk add --no-cache curl
            curl -sSf https://sh.rustup.rs | sh -s -- -y
            source $HOME/.cargo/env
            rustup target add aarch64-unknown-linux-gnus
            export CC=aarch64-linux-musl-gcc
            export CXX=aarch64-linux-musl-g++
            cd /workspace
            cargo build --target aarch64-unknown-linux-gnus --release
            LIB_PATH=target/aarch64-unknown-linux-gnus/release/libsmartdns_ui.so
            LIB_NAME=$(basename $LIB_PATH)
            mkdir -p package/aarch64/lib
            cp $LIB_PATH package/aarch64/lib/
            apk add --no-cache qemu-user-static
            function copy_dependencies() {
                local lib=$1
                local dest_dir=$2
                local copied_files=()
                while read -r line; do
                    if [[ $line =~ ^\/\w+ ]]; then
                        dep_path=${line#/}
                        dep_name=${dep_path##*/}
                        if ! [[ " ${copied_files[@]} " =~ " $dep_path " ]]; then
                            cp \"$dep_path\" \"$dest_dir\"
                            copied_files+=(\"$dep_path\")
                            copy_dependencies \"$dest_dir/$dep_name\" \"$dest_dir\"
                        fi
                    fi
                done < <(qemu-aarch64-static ldd \"$lib\" | grep \" => \" | awk '{print $3}')
            }
            copy_dependencies \"package/aarch64/lib/$LIB_NAME\" \"package/aarch64/lib/\"
            tar -czf libsmartdns_ui_aarch64.tar.gz package/aarch64
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v2
        with:
          name: libsmartdns_ui_aarch64.tar.gz
          path: libsmartdns_ui_aarch64.tar.gz

  upload_release:
    runs-on: Ubuntu-22.04
    needs:
      - create_release
      - build_x86_64
      - build_aarch64
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v2
        with:
          path: artifacts/

      - name: Upload assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create_release.output.id }}
          asset_path: |
            artifacts/libsmartdns_ui_x86_64.tar.gz
            artifacts/libsmartdns_ui_aarch64.tar.gz
          asset_name: |
            libsmartdns_ui_x86_64.tar.gz
            libsmartdns_ui_aarch64.tar.gz
          asset_content_type: application/gzip
