name: Build and Release SmartDNS UI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
        include:
          - target: x86_64-unknown-linux-gnu
            name: x86-64
          - target: aarch64-unknown-linux-gnu
            name: aarch64_generic

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        target: ${{ matrix.target }}  # 添加目标架构

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libc6-dev gcc-aarch64-linux-gnu
        rustup target add ${{ matrix.target }}

    - name: Build libsmartdns_ui.so
      working-directory: plugin/smartdns-ui
      env:
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      run: |
        EXTRA_CFLAGS=-fPIC make
        mkdir -p release-${{ matrix.name }}
        cp target/${{ matrix.target }}/release/libsmartdns_ui.so release-${{ matrix.name }}/

    - name: Collect dynamic dependencies
      working-directory: plugin/smartdns-ui/release-${{ matrix.name }}
      run: |
        # 对于 x86-64 使用原生 ldd，对于 aarch64 使用交叉工具链的 ldd
        if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
          ldd libsmartdns_ui.so | grep "=> /" | awk '{print $3}' | xargs -I {} cp {} . || true
          cp /lib64/ld-linux-x86-64.so.2 . || cp /usr/lib64/ld-linux-x86-64.so.2 . || true
        else
          # 对于 aarch64，我们需要手动指定常见依赖，因为无法直接运行 ldd
          cp /usr/aarch64-linux-gnu/lib/ld-linux-aarch64.so.1 . || true
          cp /usr/aarch64-linux-gnu/lib/libc.so.6 . || true
          cp /usr/aarch64-linux-gnu/lib/libm.so.6 . || true
        fi

    - name: Package release
      working-directory: plugin/smartdns-ui
      run: |
        tar -czvf smartdns-ui-release-${{ matrix.name }}.tar.gz -C release-${{ matrix.name }} .
        ls -lh smartdns-ui-release-${{ matrix.name }}.tar.gz

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: smartdns-ui-release-${{ matrix.name }}
        path: plugin/smartdns-ui/smartdns-ui-release-${{ matrix.name }}.tar.gz
        retention-days: 30
        if-no-files-found: error

    - name: Create Release and Upload
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        files: plugin/smartdns-ui/smartdns-ui-release-${{ matrix.name }}.tar.gz
        tag_name: "v${{ github.run_number }}"
        name: "SmartDNS UI Release ${{ github.run_number }}"
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}