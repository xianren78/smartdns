name: Build and Package libsmartdns_ui

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target_arch: [x86_64, aarch64]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup QEMU
      uses: docker/setup-qemu-action@v3

    - name: Install cross-compilation tools
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          musl-tools \
          gcc-aarch64-linux-gnu \
          g++-aarch64-linux-gnu \
          qemu-user-static \
          libc6-dev-arm64-cross

    - name: Configure environment
      run: |
        if [ "${{ matrix.target_arch }}" = "x86_64" ]; then
          export CC="musl-gcc -static"
          export TARGET_DIR="x86_64"
        else
          export CC="aarch64-linux-gnu-gcc --sysroot=/usr/aarch64-linux-gnu"
          export TARGET_DIR="aarch64"
        fi
        mkdir -p build/$TARGET_DIR
        echo "CC=$CC" >> $GITHUB_ENV
        echo "TARGET_DIR=$TARGET_DIR" >> $GITHUB_ENV

    - name: Build libsmartdns_ui.so
      working-directory: ./build/${{ env.TARGET_DIR }}
      run: |
        $CC -shared -fPIC \
          -o libsmartdns_ui.so \
          ../../src/*.c \
          -I../../include \
          -ldl

    - name: Find dependencies
      id: find-deps
      working-directory: ./build/${{ env.TARGET_DIR }}
      run: |
        # 使用qemu模拟执行环境查找依赖
        deps=$(qemu-${{ matrix.target_arch }} -L /usr/${{ matrix.target_arch }}-linux-gnu \
          ldd libsmartdns_ui.so | \
          grep -o '/.*\.so[^ ]*' | \
          sort -u)
        
        mkdir -p package/${{ env.TARGET_DIR }}/libs
        echo "deps=$(echo $deps | tr '\n' ' ')" >> $GITHUB_OUTPUT

    - name: Copy libraries
      working-directory: ./build/${{ env.TARGET_DIR }}
      run: |
        # 复制主库
        cp libsmartdns_ui.so package/${{ env.TARGET_DIR }}/
        
        # 复制依赖库
        for dep in ${{ steps.find-deps.outputs.deps }}; do
          if [ -f "$dep" ]; then
            cp --parents "$dep" package/${{ env.TARGET_DIR }}/libs/
          fi
        done

        # 复制动态链接器
        if [ "${{ matrix.target_arch }}" = "x86_64" ]; then
          cp /lib/x86_64-linux-gnu/ld-linux-x86-64.so.2 package/${{ env.TARGET_DIR }}/libs/
        else
          cp /usr/aarch64-linux-gnu/lib/ld-linux-aarch64.so.1 package/${{ env.TARGET_DIR }}/libs/
        fi

    - name: Package artifacts
      run: |
        cd build/${{ env.TARGET_DIR }}/package/${{ env.TARGET_DIR }}
        tar czvf ../libsmartdns_ui-${{ matrix.target_arch }}.tar.gz .

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: libsmartdns_ui-${{ matrix.target_arch }}
        path: build/${{ env.TARGET_DIR }}/package/libsmartdns_ui-${{ matrix.target_arch }}.tar.gz
