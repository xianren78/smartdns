name: Build and Package libsmartdns_ui

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-musl:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [ x86_64, aarch64 ]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup QEMU (for cross-ldd on aarch64)
        uses: docker/setup-qemu-action@v3

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            musl-tools qemu-user-static

          # -------------------------------------------------------------
          # 1) If your environment provides an aarch64 musl cross-compiler
          #    in a standard package, install it here, e.g.:
          #
          # sudo apt-get install -y aarch64-linux-musl-cross
          #
          # 2) Or if you built your custom aarch64-musl-gcc, retrieve it here,
          #    e.g. from a PPA or a tarball you distribute. Example:
          #
          # wget https://example.com/aarch64-musl-gcc.tar.gz
          # tar xzf aarch64-musl-gcc.tar.gz -C /usr/local
          # (export PATH etc. if needed)
          # -------------------------------------------------------------

      - name: Set environment for each arch
        id: setenv
        run: |
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            # Using musl-gcc from musl-tools for x86_64
            echo "CC=musl-gcc" >> $GITHUB_ENV
            # The dynamic linker path is typically /lib/ld-musl-$ARCH.so.1
            echo "MUSL_LD=/lib/ld-musl-x86_64.so.1" >> $GITHUB_ENV
            echo "QEMU_CMD=qemu-x86_64" >> $GITHUB_ENV
          else
            # Using aarch64-linux-musl-gcc for aarch64 (assumes you installed it above!)
            # If your compiler is named differently, adjust here.
            echo "CC=aarch64-linux-musl-gcc" >> $GITHUB_ENV
            echo "MUSL_LD=/lib/ld-musl-aarch64.so.1" >> $GITHUB_ENV
            echo "QEMU_CMD=qemu-aarch64" >> $GITHUB_ENV

          echo "TARGET_DIR=${{ matrix.arch }}" >> $GITHUB_ENV

      - name: Build libsmartdns_ui.so
        run: |
          # Create a separate build folder per architecture
          mkdir -p build/${{ env.TARGET_DIR }}
          cd build/${{ env.TARGET_DIR }}

          # Compile .c sources into a shared library
          # Replace ../../src/*.c with the actual C source files for your project
          $CC -shared -fPIC \
            -o libsmartdns_ui.so \
            ../../src/*.c \
            -I ../../include \
            -ldl

      - name: Find musl-based dependencies
        id: find-deps
        run: |
          cd build/${{ env.TARGET_DIR }}

          # We'll run ldd under QEMU to see what dynamic libs are required by libsmartdns_ui.so
          # Some musl cross-compilers might not provide an 'ldd', so we rely on QEMU's ability to run
          # the dynamic linker in the target environment. If ldd doesn't work as expected, you may
          # need another approach (e.g. reading DT_NEEDED entries with objdump).
          deps=$(${{ env.QEMU_CMD }} libsmartdns_ui.so 2>&1 | grep -o '/.*\.so[^ ]*' | sort -u)

          # If that approach doesn't work, try:
          #   ${{ env.QEMU_CMD }} -L /path/to/musl-root ldd ./libsmartdns_ui.so
          # or use alternative tooling.

          echo "deps=$deps" >> $GITHUB_OUTPUT

      - name: Copy library and dependencies
        run: |
          cd build/${{ env.TARGET_DIR }}

          mkdir -p package/libs
          # Copy main .so
          cp libsmartdns_ui.so package/

          # Copy dynamic linker, if it exists on the runner
          # Sometimes /lib/ld-musl-*.so.* may not exist on your system by default,
          # or it may exist in a custom location if you installed a cross-compiler from a tarball.
          if [ -f "${{ env.MUSL_LD }}" ]; then
            cp "${{ env.MUSL_LD }}" package/libs/
          fi

          # Copy other discovered dependencies
          for dep in ${{ steps.find-deps.outputs.deps }}; do
            if [ -f "$dep" ]; then
              # --parents preserves directory structure
              cp --parents "$dep" package/libs/
            fi
          done

      - name: Create tarball
        run: |
          cd build/${{ env.TARGET_DIR }}/package
          # You can rename the tarball as you prefer
          tar czvf ../libsmartdns_ui-${{ matrix.arch }}.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libsmartdns_ui-${{ matrix.arch }}
          path: build/${{ env.TARGET_DIR }}/libsmartdns_ui-${{ matrix.arch }}.tar.gz

