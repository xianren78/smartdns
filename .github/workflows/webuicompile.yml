name: Build and Release libsmartdns_ui

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]


jobs:
  create_release:
    runs-on: Ubuntu-22.04
    outputs:
      upload_url: ${{ steps.create_release.output.id }}
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: true
          prerelease: false

  build_x86_64:
    runs-on: Ubuntu-22.04
    needs: create_release
    steps:
      - name: Checkout code
        uses: actions/check-out@v2

      - name: Build x86_64
        uses: docker://yourregistry/x86_64_musl
        with:
          args: |
            export CC=x86_64-linux-musl-gcc
            export CXX=x86_64-linux-musl-g++
            cargo build --target x86_64-unknown-linux-musl --release -- -L /usr/local/musl/lib
            LIB_PATH=target/x86_64-unknown-linux-musl/release/libsmartdns_ui.so
            DEPENDENCIES=$(ldd $LIB_PATH | awk '/=>/ {print $3}' | tr -d '()')
            mkdir -p package/x86_64
            cp $LIB_PATH package/x86_64/
            for dep in $DEPENDENCIES; do
                cp $dep package/x86_64/
            done
            tar -czf libsmartdns_ui_x86_64.tar.gz package/x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v2
        with:
          name: libsmartdns_ui_x86_64.tar.gz
          path: libsmartdns_ui_x86_64.tar.gz

  build_aarch64:
    runs-on: Ubuntu-22.04
    needs: create_release
    steps:
      - name: Checkout code
        uses: actions/check-out@v2

      - name: Build aarch64
        uses: docker://yourregistry/aarch64_cross_musl
        with:
          args: |
            export CC=aarch64-linux-musl-gcc
            export CXX=aarch64-linux-musl-g++
            cargo build --target aarch64-unknown-linux-musl --release -- -L /usr/local/aarch64-mul/lib
            LIB_PATH=target/aarch64-unknown-linux-musl/release/libsmartdns_ui.so
            DEPENDENCIES=$(qemu-aarch64-static ldd $LIB_PATH | awk '/=>/ {print $3}' | tr -d '()')
            mkdir -p package/aarch64
            cp $LIB_PATH package/aarch64/
            for dep in $DEPENDENCIES; do
                cp $dep package/aarch64/
            done
            tar -czf libsmartdns_ui_aarch64.tar.gz package/aarch64

      - name: Upload artifact
        uses: actions/upload-artifact@v2
        with:
          name: libsmartdns_ui_aarch64.tar.gz
          path: libsmartdns_ui_aarch64.tar.gz

  upload_release:
    runs-on: Ubuntu-22.04
    needs:
      - create_release
      - build_x86_64
      - build_aarch64
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v2
        with:
          path: artifacts/

      - name: Upload assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create_release.output.id }}
          asset_path: |
            artifacts/libsmartdns_ui_x86_64.tar.gz
            artifacts/libsmartdns_ui_aarch64.tar.gz
          asset_name: |
            libsmartdns_ui_x86_64.tar.gz
            libsmartdns_ui_aarch64.tar.gz
          asset_content_type: application/gzip
