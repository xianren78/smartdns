name: Build and Package libsmartdns_ui.so for musl

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      update-version:
        description: 'Set to true to update version number'
        default: 'false'

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.set-version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
      - name: Get or Set Version
        id: set-version
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION | grep "CUR_VERS" | sed 's/CUR_VERS=\(.*\)/\1/' || echo "1.0.0")
          else
            VERSION="1.0.0"
            echo "CUR_VERS=$VERSION" > VERSION
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: get-version
    strategy:
      matrix:
        arch: [x86_64, aarch64]
      fail-fast: false
    runs-on: ubuntu-latest
    env:
      TARGET: ${{ matrix.arch == 'x86_64' && 'x86_64-unknown-linux-musl' || 'aarch64-unknown-linux-musl' }}
      DOCKER_IMAGE: ${{ matrix.arch == 'x86_64' && 'muslcc/x86_64:x86_64-linux-musl' || 'muslcc/x86_64:aarch64-linux-musl' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build libsmartdns_ui.so in Docker
        run: |
          mkdir -p build/${{ matrix.arch }}
          docker run -i --rm -v ${{ github.workspace }}:/workdir ${{ env.DOCKER_IMAGE }} sh -c "
            apk add --no-cache curl build-base openssl-dev pkgconf perl make &&
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain 1.81.0 &&
            source \$HOME/.cargo/env &&
            rustc --version && cargo --version &&  # Verify Rust and Cargo versions
            echo '=== Cargo.toml ===' && cat /workdir/plugin/smartdns-ui/Cargo.toml &&  # Debug: Show Cargo.toml
            cd /workdir/plugin/smartdns-ui &&
            cargo build --release --target ${{ env.TARGET }} &&
            cp target/${{ env.TARGET }}/release/libsmartdns_ui.so /workdir/build/${{ matrix.arch }}/
          " || echo "Build failed for ${{ matrix.arch }}, check logs"

      - name: Package Artifacts
        run: |
          cd build/${{ matrix.arch }}
          tar -czvf ../../libsmartdns_ui-${{ matrix.arch }}-musl.tar.gz .
          cd ../..

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libsmartdns_ui-${{ matrix.arch }}-musl
          path: libsmartdns_ui-${{ matrix.arch }}-musl.tar.gz
          retention-days: 30

      - name: Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.get-version.outputs.VERSION }}
          files: libsmartdns_ui-${{ matrix.arch }}-musl.tar.gz
