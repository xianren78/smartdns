name: Build and Package libsmartdns_ui.so for musl

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:  # 允许手动触发
    inputs:
      update-version:
        description: 'Set to true to update version number'
        default: 'false'

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.set-version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: VERSION_CONTROL  # 假设你有类似的分支
          fetch-depth: 1
      - name: Get or Set Version
        id: set-version
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION | grep "CUR_VERS" | sed 's/CUR_VERS=\(.*\)/\1/')
          else
            VERSION="1.0.0"
            echo "CUR_VERS=$VERSION" > VERSION
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: get-version
    strategy:
      matrix:
        arch: [x86_64, aarch64]  # 可扩展到更多架构
      fail-fast: false
    runs-on: ubuntu-latest
    env:
      TARGET: ${{ matrix.arch == 'x86_64' && 'x86_64-unknown-linux-musl' || 'aarch64-unknown-linux-musl' }}
      DOCKER_IMAGE: ${{ matrix.arch == 'x86_64' && 'muslcc/x86_64:x86_64-linux-musl' || 'muslcc/x86_64:aarch64-linux-musl' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build libsmartdns_ui.so in Docker
        run: |
          mkdir -p build/${{ matrix.arch }}
          docker run -i --rm -v ${{ github.workspace }}:/workdir ${{ env.DOCKER_IMAGE }} sh -c "
            apk add rust cargo openssl-dev pkgconf perl make &&
            cd /workdir/plugin/smartdns-ui &&
            cargo build --release --target ${{ env.TARGET }} &&
            cp target/${{ env.TARGET }}/release/libsmartdns_ui.so /workdir/build/${{ matrix.arch }}/
          " || echo "Build failed for ${{ matrix.arch }}, check logs"

      - name: Package Artifacts
        run: |
          cd build/${{ matrix.arch }}
          tar -czvf ../../libsmartdns_ui-${{ matrix.arch }}-musl.tar.gz .
          cd ../..

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libsmartdns_ui-${{ matrix.arch }}-musl
          path: libsmartdns_ui-${{ matrix.arch }}-musl.tar.gz
          retention-days: 30

      - name: Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.get-version.outputs.VERSION }}
          files: libsmartdns_ui-${{ matrix.arch }}-musl.tar.gz

  update-version:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.update-version == 'true'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: VERSION_CONTROL
          fetch-depth: 1
      - name: Increment Version
        run: |
          VERSION=$(cat VERSION | grep "CUR_VERS" | sed 's/CUR_VERS=\(.*\)/\1/')
          NEW_VERSION=$(echo $VERSION | awk -F. '{$NF+=1; print $1"."$2"."$NF}')
          sed -i "s/CUR_VERS=.*/CUR_VERS=$NEW_VERSION/" VERSION
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add VERSION
          git commit -m "Bump version to $NEW_VERSION"
      - uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: VERSION_CONTROL
