name: WebUI CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        profile: minimal
        toolchain: stable

    # 重新编译 libsmartdns-test.a 使用 -fPIC
    - name: Prepare Test Library with -fPIC
      run: |
        cd plugin/smartdns-ui/../../src
        make clean
        make libsmartdns-test.a CFLAGS="-fPIC"

    # 测试
    - name: Run Tests
      run: |
        make -C plugin/smartdns-ui test

    # 编译 Release 版本
    - name: Build Release
      run: |
        make -C plugin/smartdns-ui

    # 打包
    - name: Package
      run: |
        mkdir -p release
        cp plugin/smartdns-ui/target/libsmartdns_ui.so release/
        tar -czvf smartdns-ui-release.tar.gz -C release .

    # 创建并上传 Release
    - name: Create Release and Upload Artifact
      if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: "v${{ github.run_number }}"
        release_name: "Release v${{ github.run_number }}"
        files: smartdns-ui-release.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
