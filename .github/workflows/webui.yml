name: WebUI CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: false
        default: 'auto'
      skip_tests:
        description: 'Skip running tests? (true/false)'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        profile: minimal
        toolchain: stable

    - name: Run Tests
      if: github.event.inputs.skip_tests != 'true'
      run: |
        make -C plugin/smartdns-ui test

    - name: Build Release
      run: |
        make -C plugin/smartdns-ui

    - name: Package
      run: |
        mkdir -p release
        cp plugin/smartdns-ui/target/libsmartdns_ui.so release/
        tar -czvf smartdns-ui-release.tar.gz -C release .

    - name: Create Release and Upload Artifact
      if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version == 'auto' && format('v{0}', github.run_number) || github.event.inputs.version }}
        release_name: ${{ github.event.inputs.version == 'auto' && format('Release v{0}', github.run_number) || format('Release {0}', github.event.inputs.version) }}
        files: smartdns-ui-release.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
