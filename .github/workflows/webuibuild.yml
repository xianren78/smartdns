name: Build and Release SmartDNS UI Libraries

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
        arch: [x86_64, aarch64]
        expected_arch: [x86-64, aarch64]
        exclude:
          - platform: linux/amd64
            arch: aarch64
          - platform: linux/arm64
            arch: x86_64
          - platform: linux/amd64
            expected_arch: aarch64
          - platform: linux/arm64
            expected_arch: x86-64
    steps:
      - uses: actions/checkout@v3
      
      # Setup multi-arch building
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v2
        with:
          platforms: ${{ matrix.platform }}
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      # Build Docker image for specific platform
      - name: Build Docker Image
        run: |
          docker buildx build --platform ${{ matrix.platform }} \
            --build-arg ARCH=${{ matrix.arch }} \
            -t smartdns-builder-${{ matrix.platform }} \
            --load \
            -f Dockerfile .
      
      # Extract files from the built image
      - name: Extract Files from Image
        run: |
          mkdir -p release-files-${{ matrix.platform }}
          docker create --name temp-container smartdns-builder-${{ matrix.platform }}
          docker cp temp-container:/usr/lib/libsmartdns_ui.so release-files-${{ matrix.platform }}/ || echo "Failed to copy libsmartdns_ui.so"
          docker cp temp-container:/usr/lib/libgcc_s.so.1 release-files-${{ matrix.platform }}/ || echo "Failed to copy libgcc_s.so.1"
          docker rm temp-container
          echo "Files extracted to release-files-${{ matrix.platform }}:"
          ls -l release-files-${{ matrix.platform }} || echo "No files found"
      
      # Validate architecture of libsmartdns_ui.so
      - name: Validate Architecture
        run: |
          cd release-files-${{ matrix.platform }}
          echo "Checking architecture of libsmartdns_ui.so:"
          file libsmartdns_ui.so
          ARCH=$(file libsmartdns_ui.so | grep -oE 'x86-64|aarch64' || echo "unknown")
          echo "Detected architecture: $ARCH"
          if [ "$ARCH" != "${{ matrix.expected_arch }}" ]; then
            echo "Error: Expected ${{ matrix.expected_arch }} but got $ARCH for ${{ matrix.platform }}"
            exit 1
          fi
          echo "Architecture validation passed"
      
      # Create platform-specific release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.sha }}-${{ matrix.platform }}
          name: Release ${{ github.sha }} (${{ matrix.platform }})
          body: |
            Automated release for ${{ matrix.platform }} containing:
            - libsmartdns_ui.so
            - libgcc_s.so.1
            Built from source for ${{ matrix.platform }}
          draft: false
          prerelease: false
          files: |
            release-files-${{ matrix.platform }}/libsmartdns_ui.so
            release-files-${{ matrix.platform }}/libgcc_s.so.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
